<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmartJanja</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="icon" type="image/jpg" href="smart.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        :root {
            --primary-color: #007BFF;
            --secondary-color: #28a745;
            --background-light: #f4f7f9;
            --card-background: #ffffff;
            --text-dark: #333;
            --text-muted: #6c757d;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--background-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .auth-container {
            background-color: var(--card-background);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .logo-img {
            margin-bottom: 40px;
            animation: bounce 2s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
        }
          
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }

        .auth-container h1 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .auth-tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .auth-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .auth-form {
            display: none;
            text-align: left;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-dark);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-submit:hover {
            background-color: #0056b3;
        }

        .para {
            font-weight: bold;
            color: #474545;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="splash" class="auth-container">
         <h1 class="logo-img">Smart Janja</h1>
   
        <div class="auth-tabs">
            <span class="auth-tab active" id="signup-tab">Jisajili</span>
            <span class="auth-tab" id="login-tab">Ingia</span>
        </div>

        <div id="signup-form" class="auth-form active">
            <h2>Usajili wa Msimamizi</h2>
            <form id="admin-signup-form">
                <div class="form-group">
                    <label for="owner-fullname">Jina Kamili</label>
                    <input type="text" id="owner-fullname" required />
                </div>
                <div class="form-group">
                    <label for="phone-number">Namba ya Simu</label>
                    <input type="tel" id="phone-number" placeholder="Mfano: 0712345678" required>
                </div>
                <div class="form-group">
                    <label for="admin-password">Neno la Siri</label>
                    <input type="password" id="admin-password" required />
                    <span class="password-toggle" onclick="togglePasswordVisibility('admin-password')"><i class="fa-solid fa-eye"></i></span>
                </div>
                <p class="para">Kwa msaada tupigie au tuma ujumbe mfupi kupitia namba: 0786701705</p>
                <button type="submit" class="btn-submit">Jisajili</button>
            </form>
        </div>

        <div id="login-form" class="auth-form">
            <h2>Ingia kama Msimamizi</h2>
            <form id="login-admin-form">
                <div class="form-group">
                    <label for="admin-login-phone">Namba ya Simu</label>
                    <input type="tel" id="admin-login-phone" placeholder="Mfano: 0712345678" required />
                </div>
                <div class="form-group">
                    <label for="admin-login-password">Neno la Siri</label>
                    <input type="password" id="admin-login-password" required />
                    <span class="password-toggle" onclick="togglePasswordVisibility('admin-login-password')"><i class="fa-solid fa-eye"></i></span>
                </div>
                <p class="para">Kwa msaada tupigie au tuma ujumbe mfupi kupitia namba: 0786701705</p>
                <button type="submit" class="btn-submit">Ingia</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://dbtqwpwuktyqgnznxthw.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRidHF3cHd1a3R5cWduem54dGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczMDYwMjcsImV4cCI6MjA3Mjg4MjAyN30.aMbbK6r76HLusW4HfBr3bsGcYXFJHg_Cm-qPdWYh79M';
       
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- Mfumo wa Auto-Login ---
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (session) {
                // Kama mtumiaji tayari yupo logged in, chukua ID yake na umpeleke ndani
                const { data: businessProfile } = await supabaseClient
                    .from('business_profiles')
                    .select('id')
                    .eq('admin_id', session.user.id)
                    .single();

                if (businessProfile) {
                    window.location.href = `msimamizi.html?businessId=${businessProfile.id}`;
                }
            }
        });

        // Tab switching logic
        const signupTab = document.getElementById('signup-tab');
        const loginTab = document.getElementById('login-tab');
        const signupForm = document.getElementById('signup-form');
        const loginForm = document.getElementById('login-form');
    
        signupTab.addEventListener('click', () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupForm.classList.add('active');
            loginForm.classList.remove('active');
        });
    
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginForm.classList.add('active');
            signupForm.classList.remove('active');
        });
    
        function togglePasswordVisibility(inputId) {
            const inputField = document.getElementById(inputId);
            const icon = inputField.nextElementSibling.querySelector('i');
            if (inputField.type === 'password') {
                inputField.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                inputField.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    
        // Sign up handler
        document.getElementById('admin-signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const ownerFullName = document.getElementById('owner-fullname').value.trim();
            const phoneNumber = document.getElementById('phone-number').value.trim();
            const adminPassword = document.getElementById('admin-password').value;

            if (adminPassword.length < 6) {
                alert('Neno la siri lazima liwe na angalau herufi 6.');
                return;
            }
    
            // Tengeneza email feki kutumia namba ya simu ili Supabase ikubali
            const systemEmail = `${phoneNumber}@smartjanja.com`;

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: systemEmail,
                    password: adminPassword,
                });
    
                if (error) {
                    // Check if it's a duplicate email error to give a friendly message
                    if(error.message.includes("already registered")) {
                        alert("Namba hii ya simu imeshasajiliwa tayari. Tafadhali ingia (login).");
                    } else {
                        alert(`Hitilafu wakati wa usajili: ${error.message}`);
                    }
                    return;
                }
    
                const { error: insertError } = await supabaseClient
                    .from('business_profiles')
                    .insert({
                        owner_fullname: ownerFullName,
                        phone_number: phoneNumber,
                        admin_id: data.user.id
                    });
    
                if (insertError) {
                    alert(`Hitilafu kuhifadhi taarifa: ${insertError.message}`);
                    return;
                }
    
                const { data: businessProfile, error: fetchError } = await supabaseClient
                    .from('business_profiles')
                    .select('id')
                    .eq('admin_id', data.user.id)
                    .single();
    
                if (fetchError || !businessProfile) {
                    alert(`Hitilafu kupakua data: ${fetchError ? fetchError.message : ''}`);
                    return;
                }
    
                window.location.href = `msimamizi.html?businessId=${businessProfile.id}`;
    
            } catch (err) {
                alert(`Hitilafu isiyojulikana: ${err.message}`);
            }
        });
    
        // Login handler
        document.getElementById('login-admin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phoneNumber = document.getElementById('admin-login-phone').value.trim();
            const adminPassword = document.getElementById('admin-login-password').value;

            // Tumia format ileile ya email feki tuliyotengeneza wakati wa usajili
            const systemEmail = `${phoneNumber}@smartjanja.com`;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: systemEmail,
                    password: adminPassword,
                });

                if (error) {
                    alert(`Namba ya simu au Neno la siri si sahihi.`);
                    return;
                }

                const { data: businessProfile, error: fetchError } = await supabaseClient
                    .from('business_profiles')
                    .select('id')
                    .eq('admin_id', data.user.id)
                    .single();

                if (fetchError || !businessProfile) {
                    alert('Kuna tatizo na akaunti hii. Tafadhali wasiliana na msaada.');
                    await supabaseClient.auth.signOut(); 
                    return;
                }
                
                window.location.href = `msimamizi.html?businessId=${businessProfile.id}`;

            } catch (err) {
                alert(`Kuna tatizo limetokea: ${err.message}`);
            }
        });
    </script>
</body>
</html>
